name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint orchestrator
        run: cd orchestrator && ruff check src/ tests/
      - name: Lint mock backends
        run: cd mock_backends && ruff check src/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install orchestrator deps
        run: cd orchestrator && pip install .
      - name: Run tests
        run: cd orchestrator && python -m pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build orchestrator
        run: docker build -t tiger-orchestrator ./orchestrator
      - name: Build mock backends
        run: docker build -t tiger-mock-backends ./mock_backends

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - name: Start services
        run: docker compose up -d
      - name: Wait for health
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1 && \
               curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "Services healthy!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done
      - name: Verify orchestrator health
        run: |
          response=$(curl -sf http://localhost:8000/health)
          echo "$response"
          echo "$response" | python -c "import sys,json; d=json.load(sys.stdin); assert d['status'] in ['healthy','degraded']"
      - name: Verify mock backends health
        run: |
          response=$(curl -sf http://localhost:8001/health)
          echo "$response"
          echo "$response" | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='healthy'; assert d['customers_loaded']>0"
      - name: Test customer API
        run: |
          curl -sf http://localhost:8001/api/customers/TC001 | python -c "
          import sys,json
          d=json.load(sys.stdin)
          assert d['customer_id']=='TC001'
          assert d['onboarding_stage']=='EKYC_PENDING'
          print('Customer API: OK')
          "
      - name: Test compliance check
        run: |
          curl -sf http://localhost:8001/api/compliance/TC001/check | python -c "
          import sys,json
          d=json.load(sys.stdin)
          assert d['customer_id']=='TC001'
          assert 'checks' in d
          print('Compliance API: OK')
          "
      - name: Test event processing
        run: |
          response=$(curl -sf -X POST "http://localhost:8000/api/events/process?event_type=card_approved&customer_id=TC001&source_system=ci_test")
          echo "$response"
          echo "$response" | python -c "
          import sys,json
          d=json.load(sys.stdin)
          assert 'event_id' in d
          assert 'result' in d
          print('Event processing: OK')
          "
      - name: Test consent-blocked customer
        run: |
          response=$(curl -sf -X POST "http://localhost:8000/api/events/process?event_type=card_approved&customer_id=TC008&source_system=ci_test")
          echo "$response"
          echo "$response" | python -c "
          import sys,json
          d=json.load(sys.stdin)
          assert d['result']['action']=='blocked'
          print('Consent blocking: OK')
          "
      - name: Cleanup
        if: always()
        run: docker compose down -v
